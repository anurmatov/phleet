<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 740" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Phleet architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#666">Everything goes through RabbitMQ. Agents are containers that call tools and run workflows.</text>

  <!-- ENTRY POINTS -->
  <rect x="240" y="92" width="200" height="56" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="340" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Telegram</text>
  <text x="340" y="136" text-anchor="middle" font-size="10" fill="#666">DM your agents · group chat</text>

  <rect x="660" y="92" width="200" height="56" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="760" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Dashboard</text>
  <text x="760" y="136" text-anchor="middle" font-size="10" fill="#666">manage agents · run workflows</text>

  <!-- Both entries → into RMQ -->
  <line x1="340" y1="148" x2="340" y2="208" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="760" y1="148" x2="760" y2="208" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RABBITMQ — prominent full-width bar -->
  <rect x="80" y="210" width="940" height="78" rx="6" fill="#f0f0f0" stroke="#222" stroke-width="2"/>
  <text x="550" y="244" text-anchor="middle" font-size="17" font-weight="700" fill="#111">RabbitMQ — message bus</text>
  <text x="550" y="266" text-anchor="middle" font-size="11" fill="#666">no agent talks to another agent directly · everything (incl. workflow → agent delegation) flows through here</text>

  <!-- RMQ → Agents -->
  <line x1="200" y1="288" x2="200" y2="352" stroke="#999" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="430" y1="288" x2="430" y2="352" stroke="#999" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="660" y1="288" x2="660" y2="352" stroke="#999" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="890" y1="288" x2="890" y2="352" stroke="#999" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- AGENTS ROW -->
  <rect x="110" y="354" width="180" height="80" rx="6" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="200" y="382" text-anchor="middle" font-size="14" font-weight="600" fill="#111">co-CTO agent</text>
  <text x="200" y="400" text-anchor="middle" font-size="10" fill="#666">container · LLM</text>
  <text x="200" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#999">your entry agent</text>

  <rect x="340" y="354" width="180" height="80" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="430" y="382" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Agent B</text>
  <text x="430" y="400" text-anchor="middle" font-size="10" fill="#666">container · LLM</text>
  <text x="430" y="416" text-anchor="middle" font-size="10" fill="#666" font-style="italic">e.g. developer</text>

  <rect x="570" y="354" width="180" height="80" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="660" y="382" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Agent C</text>
  <text x="660" y="400" text-anchor="middle" font-size="10" fill="#666">container · LLM</text>
  <text x="660" y="416" text-anchor="middle" font-size="10" fill="#666" font-style="italic">e.g. ops</text>

  <rect x="800" y="354" width="180" height="80" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="890" y="382" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Agent D</text>
  <text x="890" y="400" text-anchor="middle" font-size="10" fill="#666">container · LLM</text>
  <text x="890" y="416" text-anchor="middle" font-size="10" fill="#666" font-style="italic">e.g. trader</text>

  <!-- Agents → MCP tools (down) -->
  <line x1="200" y1="434" x2="200" y2="492" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="434" x2="430" y2="492" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="434" x2="660" y2="492" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="890" y1="434" x2="890" y2="492" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- MCP BUS LABEL -->
  <line x1="100" y1="492" x2="990" y2="492" stroke="#999" stroke-width="1.2"/>
  <text x="85" y="496" text-anchor="end" font-size="10" font-weight="600" fill="#aaa" letter-spacing="0.5">MCP</text>

  <!-- MCP bus stubs to tools -->
  <line x1="200" y1="492" x2="200" y2="522" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="492" x2="430" y2="522" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="492" x2="660" y2="522" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="890" y1="492" x2="890" y2="522" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- TOOLS -->
  <rect x="110" y="524" width="180" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="200" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#111">fleet-memory</text>
  <text x="200" y="566" text-anchor="middle" font-size="10" fill="#666">semantic memory (Qdrant)</text>

  <rect x="340" y="524" width="180" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="430" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#111">fleet-temporal-bridge</text>
  <text x="430" y="566" text-anchor="middle" font-size="10" fill="#666">MCP gateway to Temporal</text>

  <rect x="570" y="524" width="180" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="660" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#111">fleet-telegram</text>
  <text x="660" y="566" text-anchor="middle" font-size="10" fill="#666">outbound · per-agent bot</text>

  <rect x="800" y="524" width="180" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="890" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#111">fleet-playwright</text>
  <text x="890" y="566" text-anchor="middle" font-size="10" fill="#666">browser automation</text>

  <!-- Temporal-bridge → Temporal -->
  <line x1="430" y1="584" x2="430" y2="616" stroke="#999" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- TEMPORAL -->
  <rect x="340" y="618" width="180" height="64" rx="6" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
  <text x="430" y="644" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Temporal</text>
  <text x="430" y="662" text-anchor="middle" font-size="10" fill="#666">workflow engine + Postgres</text>

  <!-- DELEGATE LOOP — Temporal → RMQ (workflows delegate via RMQ back to agents) -->
  <path d="M 520 650 H 1050 V 250 H 1020" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>
  <text x="1058" y="430" font-size="11" font-weight="600" fill="#999">delegate</text>
  <text x="1058" y="446" font-size="10" fill="#999">activity →</text>
  <text x="1058" y="460" font-size="10" fill="#999">agent via</text>
  <text x="1058" y="474" font-size="10" fill="#999">RMQ</text>

  <!-- FOOTNOTE -->
  <text x="550" y="720" text-anchor="middle" font-size="10" fill="#999" font-style="italic">containers are provisioned and supervised by fleet-orchestrator (control plane, omitted from the data flow above)</text>
</svg>
