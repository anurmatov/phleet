<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Consensus review</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#666">Multiple reviewer agents — usually different models — review in parallel. The loop iterates until they converge.</text>

  <!-- SUBJECT -->
  <rect x="450" y="92" width="200" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="550" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Subject</text>
  <text x="550" y="136" text-anchor="middle" font-size="10" fill="#666">PR diff · design spec · memory</text>

  <!-- fan-out arrows from spread points across bottom edge of subject -->
  <line x1="490" y1="152" x2="290" y2="220" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="550" y1="152" x2="550" y2="220" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="610" y1="152" x2="810" y2="220" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- REVIEWERS -->
  <rect x="190" y="222" width="200" height="62" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="290" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Reviewer A</text>
  <text x="290" y="266" text-anchor="middle" font-size="10" fill="#666">e.g. Claude Opus</text>

  <rect x="450" y="222" width="200" height="62" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="550" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Reviewer B</text>
  <text x="550" y="266" text-anchor="middle" font-size="10" fill="#666">e.g. OpenAI Codex</text>

  <rect x="710" y="222" width="200" height="62" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="810" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Reviewer C</text>
  <text x="810" y="266" text-anchor="middle" font-size="10" fill="#666">e.g. Claude Sonnet</text>

  <!-- decision labels under each reviewer -->
  <text x="290" y="306" text-anchor="middle" font-size="10" fill="#666">decision</text>
  <text x="550" y="306" text-anchor="middle" font-size="10" fill="#666">decision</text>
  <text x="810" y="306" text-anchor="middle" font-size="10" fill="#666">decision</text>

  <!-- arrows down to converge into synthesizer -->
  <line x1="290" y1="284" x2="500" y2="380" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="550" y1="284" x2="550" y2="380" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="810" y1="284" x2="600" y2="380" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SYNTHESIZER -->
  <rect x="450" y="382" width="200" height="60" rx="6" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
  <text x="550" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#111">Synthesizer</text>
  <text x="550" y="424" text-anchor="middle" font-size="10" fill="#666">aggregate verdicts</text>

  <line x1="550" y1="442" x2="550" y2="478" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- VERDICT DIAMOND -->
  <polygon points="550,478 650,548 550,618 450,548" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="550" y="546" text-anchor="middle" font-size="13" font-weight="600" fill="#111">verdict?</text>

  <!-- approved path: down to merge -->
  <line x1="550" y1="618" x2="550" y2="666" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="580" y="644" font-size="10" fill="#666">approved</text>

  <rect x="450" y="668" width="200" height="50" rx="6" fill="#fff" stroke="#222" stroke-width="1.5"/>
  <text x="550" y="690" text-anchor="middle" font-size="13" font-weight="600" fill="#111">passes the gate</text>
  <text x="550" y="708" text-anchor="middle" font-size="10" fill="#666">workflow proceeds</text>

  <!-- rejected path: right -->
  <line x1="650" y1="548" x2="780" y2="548" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>
  <text x="715" y="540" text-anchor="middle" font-size="10" fill="#666">rejected</text>

  <rect x="780" y="518" width="200" height="60" rx="6" fill="#fff" stroke="#222" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="880" y="542" text-anchor="middle" font-size="13" font-weight="600" fill="#111">escalate to CEO</text>
  <text x="880" y="562" text-anchor="middle" font-size="10" fill="#666">human decides</text>

  <!-- changes_requested path: dashed loop back up to subject (left side) -->
  <path d="M 450 548 L 100 548 L 100 122 L 450 122" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>
  <text x="100" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#666">changes_requested</text>
  <text x="100" y="354" text-anchor="middle" font-size="10" fill="#666">revise · re-review</text>

  <!-- FOOTNOTE -->
  <text x="550" y="760" text-anchor="middle" font-size="10" fill="#999" font-style="italic">solid = forward path · dashed = feedback or escalation · used inside design, PR-implementation, and memory-store workflows</text>
</svg>
