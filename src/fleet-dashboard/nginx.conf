server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API to orchestrator
    location /api/ {
        proxy_pass http://fleet-orchestrator:3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket to orchestrator
    location /ws {
        proxy_pass http://fleet-orchestrator:3600;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health check
    location /health {
        proxy_pass http://fleet-orchestrator:3600/health;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
